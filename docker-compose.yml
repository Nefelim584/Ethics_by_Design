version: "3.9"

services:
  db:
    image: postgres:16
    container_name: ethics_by_design_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ethics
      POSTGRES_PASSWORD: ethics_password
      POSTGRES_DB: ethics
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:

