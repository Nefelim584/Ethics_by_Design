<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Ethics by Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<div class="auth-card">
    <h1>Create an account</h1>
    <p class="subtitle">Start using Ethics by Design</p>

    <div id="alert" class="alert alert-error"></div>
    <div id="success" class="alert alert-success"></div>

    <form id="registerForm" novalidate>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Min. 6 characters" required minlength="6" />
        </div>

        <div class="form-group">
            <label for="password2">Confirm password</label>
            <input id="password2" type="password" placeholder="Repeat password" required />
        </div>

        <button class="btn btn-primary" type="submit">Create account</button>
    </form>

    <div class="divider">or</div>

    <a href="/auth/login/google" class="btn btn-google">
        <!-- Google "G" logo (inline SVG) -->
        <svg viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
    </a>

    <p class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
    </p>
</div>

<script src="/static/js/auth.js"></script>
<script>
    const successEl = document.getElementById("success");

    function showSuccess(msg) {
        successEl.textContent = msg;
        successEl.classList.add("visible");
    }

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();
        successEl.classList.remove("visible");

        const email     = document.getElementById("email").value.trim();
        const password  = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;

        if (!email || !password) {
            return showError("Please fill in all fields.");
        }
        if (password.length < 6) {
            return showError("Password must be at least 6 characters.");
        }
        if (password !== password2) {
            return showError("Passwords do not match.");
        }

        const { ok, data } = await postJSON("/auth/register", { email, password });

        if (ok) {
            // Account created but pending admin approval
            document.getElementById("registerForm").style.display = "none";
            showSuccess("✅ Account created! Your account is pending admin approval. You'll be able to sign in once it's approved.");
        } else {
            showError(data.error || "Registration failed. Please try again.");
        }
    });
</script>
</body>
</html>
