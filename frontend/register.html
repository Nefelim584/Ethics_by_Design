<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — TranscribePodcast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<div class="auth-card">
    <h1>Create an account</h1>
    <p class="subtitle">Start using TranscribePodcast</p>

    <div id="alert" class="alert alert-error"></div>
    <div id="success" class="alert alert-success"></div>

    <form id="registerForm" novalidate>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Min. 6 characters" required minlength="6" />
        </div>

        <div class="form-group">
            <label for="password2">Confirm password</label>
            <input id="password2" type="password" placeholder="Repeat password" required />
        </div>

        <div class="form-group consent-group">
            <label class="consent-label">
                <input id="consent" type="checkbox" required />
                <span>I agree to the processing of my personal data (email address and audio files) for the purpose of providing the transcription service.</span>
            </label>
        </div>

        <button class="btn btn-primary" type="submit">Create account</button>
    </form>


    <p class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
    </p>
</div>

<script src="/static/js/auth.js"></script>
<script>
    const successEl = document.getElementById("success");

    function showSuccess(msg) {
        successEl.textContent = msg;
        successEl.classList.add("visible");
    }

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();
        successEl.classList.remove("visible");

        const email     = document.getElementById("email").value.trim();
        const password  = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;

        if (!email || !password) {
            return showError("Please fill in all fields.");
        }
        if (password.length < 6) {
            return showError("Password must be at least 6 characters.");
        }
        if (password !== password2) {
            return showError("Passwords do not match.");
        }
        if (!document.getElementById("consent").checked) {
            return showError("You must agree to the data processing consent to register.");
        }

        const { ok, data } = await postJSON("/auth/register", { email, password });

        if (ok) {
            // Account created but pending admin approval
            document.getElementById("registerForm").style.display = "none";
            showSuccess("✅ Account created! Your account is pending admin approval. You'll be able to sign in once it's approved.");
        } else {
            showError(data.error || "Registration failed. Please try again.");
        }
    });
</script>
</body>
</html>
