<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — TranscribePodcast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account</p>

    <div id="alert" class="alert alert-error"></div>

    <form id="loginForm" novalidate>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••" required />
        </div>

        <button class="btn btn-primary" type="submit">Sign in</button>
    </form>


    <p class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
    </p>
</div>

<script src="/static/js/auth.js"></script>
<script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();

        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
            return showError("Please fill in both fields.");
        }

        const { ok, data } = await postJSON("/auth/login", { email, password });

        if (ok) {
            window.location.href = "/";
        } else {
            showError(data.error || "Login failed. Please try again.");
        }
    });

    // Show error messages passed via URL query params (e.g. from Google OAuth redirect)
    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "pending_approval") {
        showError("Your account is pending admin approval. Please check back later.");
    } else if (params.get("error") === "auth_failed") {
        showError("Authentication failed. Please try again.");
    }
</script>
</body>
</html>
